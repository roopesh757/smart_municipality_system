<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Municipality Portal</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="auth-page">
    <!-- Left Panel -->
    <div class="auth-left">
        <div class="auth-logo">🏛️</div>
        <h2>Welcome Back</h2>
        <p>Sign in to track your complaints and help build a better city.</p>
        <div style="margin-top:40px;display:flex;flex-direction:column;gap:12px;width:100%;max-width:300px;">
            <div style="background:rgba(255,255,255,0.08);border-radius:var(--radius);padding:16px;display:flex;gap:12px;align-items:center;">
                <span style="font-size:1.5rem;">🛣️</span>
                <div>
                    <div style="color:rgba(255,255,255,0.9);font-weight:600;font-size:0.9rem;">Road damage</div>
                    <div style="color:rgba(255,255,255,0.5);font-size:0.78rem;">Status: In Progress</div>
                </div>
                <span class="badge badge-in-progress" style="margin-left:auto;font-size:0.7rem;">🔧</span>
            </div>
            <div style="background:rgba(255,255,255,0.08);border-radius:var(--radius);padding:16px;display:flex;gap:12px;align-items:center;">
                <span style="font-size:1.5rem;">💡</span>
                <div>
                    <div style="color:rgba(255,255,255,0.9);font-weight:600;font-size:0.9rem;">Street light out</div>
                    <div style="color:rgba(255,255,255,0.5);font-size:0.78rem;">Status: Solved</div>
                </div>
                <span class="badge badge-solved" style="margin-left:auto;font-size:0.7rem;">✅</span>
            </div>
        </div>
    </div>

    <!-- Right Panel -->
    <div class="auth-right">
        <div style="margin-bottom:28px;">
            <a href="index.html" style="display:flex;align-items:center;gap:8px;color:var(--text-light);font-size:0.88rem;">← Back to Home</a>
        </div>

        <!-- Role Tabs -->
        <div class="auth-tabs">
            <div class="auth-tab active" id="tab-citizen" onclick="switchRole('citizen')">
                👤 <span>Citizen Login</span>
            </div>
            <div class="auth-tab" id="tab-admin" onclick="switchRole('admin')">
                🛡️ <span>Admin Login</span>
            </div>
        </div>

        <h1 id="login-title">Welcome Back</h1>
        <p class="auth-subtitle" id="login-subtitle">Sign in to your citizen account</p>

        <!-- Login Form -->
        <form id="login-form" novalidate>
            <div class="form-group">
                <label class="form-label">Email Address <span class="required">*</span></label>
                <input type="email" id="login-email" class="form-control" placeholder="you@example.com" required>
                <div class="form-error" id="email-error"></div>
            </div>
            <div class="form-group">
                <label class="form-label">Password <span class="required">*</span></label>
                <div style="position:relative;">
                    <input type="password" id="login-password" class="form-control" placeholder="Enter password" required>
                    <button type="button" onclick="togglePassword('login-password')" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1rem;color:var(--text-light);">👁️</button>
                </div>
                <div class="form-error" id="password-error"></div>
            </div>
            <div id="form-error" class="form-error" style="margin-bottom:12px;font-size:0.9rem;"></div>
            <button type="submit" class="btn btn-primary btn-full btn-lg" id="login-btn">
                <span>Sign In</span>
            </button>
        </form>

        <div class="auth-divider">or</div>
        <div class="auth-footer">
            <span>Don't have an account?</span>
            <a href="register.html" style="font-weight:600;"> <span>Register</span></a>
        </div>
    </div>
</div>

<div id="toast-container" class="toast-container"></div>


<script src="js/api.js"></script>
<script>
    let currentRole = 'citizen';

    // Check if pre-selected role from URL
    const params = new URLSearchParams(window.location.search);
    if (params.get('role') === 'admin') switchRole('admin');

    // Redirect if already logged in
    if (Auth.isLoggedIn()) {
        const role = Auth.getRole();
        window.location.href = role === 'admin' ? 'admin-dashboard.html' : 'dashboard.html';
    }

    function switchRole(role) {
        currentRole = role;
        document.getElementById('tab-citizen').classList.toggle('active', role === 'citizen');
        document.getElementById('tab-admin').classList.toggle('active', role === 'admin');
        document.getElementById('login-title').textContent = role === 'citizen' ? 'Welcome Back' : 'Admin Portal';
        document.getElementById('login-subtitle').textContent = role === 'citizen' ? 'Sign in to your citizen account' : 'Sign in to your admin dashboard';
        clearErrors();
    }

    function togglePassword(id) {
        const el = document.getElementById(id);
        el.type = el.type === 'password' ? 'text' : 'password';
    }

    function clearErrors() {
        ['email-error','password-error','form-error'].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.textContent = '';
        });
        document.querySelectorAll('.form-control').forEach(el => el.style.borderColor = '');
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        clearErrors();

        const email = document.getElementById('login-email').value.trim();
        const password = document.getElementById('login-password').value;
        const btn = document.getElementById('login-btn');

        // Validate
        let valid = true;
        if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
            document.getElementById('email-error').textContent = 'Please enter a valid email address.';
            document.getElementById('login-email').style.borderColor = 'var(--urgent)';
            valid = false;
        }
        if (!password) {
            document.getElementById('password-error').textContent = 'Password is required.';
            document.getElementById('login-password').style.borderColor = 'var(--urgent)';
            valid = false;
        }
        if (!valid) return;

        setLoading(btn, true);
        try {
            const endpoint = currentRole === 'citizen' ? '/auth/citizen/login' : '/auth/admin/login';
            const data = await API.post(endpoint, { email, password });

            Auth.login(data.token, data.user, data.user.role);
            showToast('Login Successful', `Welcome back, ${data.user.username}!`, 'success');

            setTimeout(() => {
                const role = data.user.role;
                window.location.href = role === 'admin' ? 'admin-dashboard.html' : 'dashboard.html';
            }, 800);
        } catch (err) {
            document.getElementById('form-error').textContent = err.message || 'Login failed. Please try again.';
            showToast('Login Failed', err.message, 'error');
        } finally {
            setLoading(btn, false);
        }
    });
</script>
</body>
</html>
